<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Maison</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body { background: var(--soft-beige); min-height: 100vh; display: flex; flex-direction: column; }
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-card { background: var(--white); border-radius: var(--radius-lg); padding: 48px; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); }
        .auth-logo { font-family: var(--font-display); font-size: 1.8rem; font-style: italic; color: var(--charcoal); text-align: center; margin-bottom: 8px; }
        .auth-tagline { text-align: center; font-size: 0.82rem; color: #aaa; font-weight: 300; margin-bottom: 36px; }
        .auth-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 500; color: var(--charcoal); margin-bottom: 28px; }
        .auth-footer { text-align: center; margin-top: 24px; font-size: 0.82rem; color: #aaa; }
        .auth-footer a { color: var(--muted-blue); font-weight: 500; }
        .btn-auth { width: 100%; background: var(--charcoal); color: var(--white); border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 0.9rem; font-weight: 500; font-family: var(--font-body); letter-spacing: 0.04em; cursor: pointer; transition: all var(--transition); }
        .btn-auth:hover { background: var(--muted-blue); box-shadow: var(--shadow-md); }
        .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg { background: #fdf0ef; color: var(--error); border: 1px solid #f5c6c2; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <a href="index.html"><p class="auth-logo">Maison</p></a>
            <p class="auth-tagline">Thoughtfully made objects for everyday living</p>
            <h1 class="auth-title">Welcome back</h1>
            <div class="error-msg" id="errorMsg"></div>
            <form id="loginForm">
                <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" id="email" placeholder="you@example.com" required autocomplete="email" /></div>
                <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password" /></div>
                <div style="margin-top:28px;"><button type="submit" class="btn-auth" id="loginBtn">Sign In</button></div>
            </form>
            <p class="auth-footer">Don't have an account? <a href="register.html">Create one →</a></p>
        </div>
    </main>
    <script src="api.js"></script>
    <script>
        if (Auth.isLoggedIn()) window.location.href = 'index.html';
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';
            btn.disabled = true; btn.textContent = 'Signing in…';
            try {
                const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email: document.getElementById('email').value.trim(), password: document.getElementById('password').value }) });
                Auth.save(data.token, data.user);
                showToast(`Welcome back, ${data.user.name.split(' ')[0]}! ✓`, 'success');
                setTimeout(() => window.location.href = 'index.html', 800);
            } catch (err) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; }
        });
    </script>
</body>
</html>
