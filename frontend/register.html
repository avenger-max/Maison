<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — Maison</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body { background: var(--soft-beige); min-height: 100vh; display: flex; flex-direction: column; }
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-card { background: var(--white); border-radius: var(--radius-lg); padding: 48px; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); }
        .auth-logo { font-family: var(--font-display); font-size: 1.8rem; font-style: italic; color: var(--charcoal); text-align: center; margin-bottom: 8px; }
        .auth-tagline { text-align: center; font-size: 0.82rem; color: #aaa; font-weight: 300; margin-bottom: 36px; }
        .auth-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 500; color: var(--charcoal); margin-bottom: 28px; }
        .auth-footer { text-align: center; margin-top: 24px; font-size: 0.82rem; color: #aaa; }
        .auth-footer a { color: var(--muted-blue); font-weight: 500; }
        .btn-auth { width: 100%; background: var(--charcoal); color: var(--white); border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 0.9rem; font-weight: 500; font-family: var(--font-body); letter-spacing: 0.04em; cursor: pointer; transition: all var(--transition); }
        .btn-auth:hover { background: var(--muted-blue); box-shadow: var(--shadow-md); }
        .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg { background: #fdf0ef; color: var(--error); border: 1px solid #f5c6c2; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
        .strength-bar { height: 3px; border-radius: 2px; background: var(--light-grey); margin-top: 8px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; transition: all var(--transition); width: 0%; }
        .password-hint { font-size: 0.75rem; color: #bbb; margin-top: 6px; }
    </style>
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <a href="index.html"><p class="auth-logo">Maison</p></a>
            <p class="auth-tagline">Join a community of thoughtful shoppers</p>
            <h1 class="auth-title">Create your account</h1>
            <div class="error-msg" id="errorMsg"></div>
            <form id="registerForm">
                <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control" id="name" placeholder="Your name" required /></div>
                <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" id="email" placeholder="you@example.com" required /></div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required oninput="checkStrength(this.value)" />
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <p class="password-hint">Minimum 6 characters</p>
                </div>
                <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required /></div>
                <div style="margin-top:28px;"><button type="submit" class="btn-auth" id="registerBtn">Create Account</button></div>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Sign in →</a></p>
        </div>
    </main>
    <script src="api.js"></script>
    <script>
        if (Auth.isLoggedIn()) window.location.href = 'index.html';
        function checkStrength(val) {
            let s = 0;
            if (val.length >= 6) s++; if (val.length >= 10) s++; if (/[A-Z]/.test(val)) s++; if (/[0-9!@#$%^&*]/.test(val)) s++;
            const colors = ['','#e74c3c','#e67e22','#f1c40f','#2e7d52'];
            const widths = ['0%','25%','50%','75%','100%'];
            document.getElementById('strengthFill').style.width = widths[s];
            document.getElementById('strengthFill').style.background = colors[s];
        }
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) { errorMsg.textContent = 'Passwords do not match.'; errorMsg.style.display = 'block'; return; }
            btn.disabled = true; btn.textContent = 'Creating account…';
            try {
                const data = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ name, email, password }) });
                Auth.save(data.token, data.user);
                showToast(`Welcome to Maison, ${data.user.name.split(' ')[0]}! 🎉`, 'success');
                setTimeout(() => window.location.href = 'index.html', 900);
            } catch (err) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; btn.disabled = false; btn.textContent = 'Create Account'; }
        });
    </script>
</body>
</html>
